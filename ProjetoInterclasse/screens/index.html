<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Interclasse</title>
</head>
<body>

    <header>
            <nav>
                <div class="logo">
                    <h1>INTER</h1>
                    <h2>CLASSE</h2>
                </div>
            <ul>
                <li>
                    Sobre
                </li>
                <li>
                    Horários
                </li>
                <li>
                    Turmas
                </li>
                <li>
                    Chaves
                </li>
                <li>
                    <i class="fas fa-user"></i>
                </li>
            </ul>
        </nav>
    </header>

    <section>
        <div class="side1">
                    <div class="container-aovivo">
            <div class="container-line">
                <div class="circle"></div>
                <div class="text-container">
                    <p>3 Jogos Hoje</p>
                </div>
            </div>
        </div>

        <div class="title-container">
            <div class="title1">
                INTER
            </div>
            <div class="title2">
                CLASSE
            </div>
        </div>

        <div class="title3">
            ETEC 2026
        </div>

        <div class="info">
            O Interclasse da ETEC tá aí! Acompanhe os confrontos, veja o ranking das turmas e torça pela sua!
        </div>

        <div class="btn1">
            <p>SAIBA MAIS</p>
        </div>

        <div class="btn2">
            <p>Ver Horários</p>
        </div>
    </div>

    <div class="side2">
        <div class="games-container">
            <div class="game-container1">
                <div class="hour">
                    <p>08:00</p>
                </div>
                <div class="gameimage">
                    <img src="" alt="">
                </div>

                <div class="classtext">
                    <p>1DS X 1ADM</p>
                </div>
                <div class="gametext">
                    Volêi feminino - Quadra 1
                </div>

                <div class="container-aovivo">
                    <div class="circle"></div>
                    <div class="text-container">
                        <p>Hoje</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </section>
    
</body>
</html>
